<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reset Password</title>
        <link rel="stylesheet" href="./style/reset.css">
        <link rel="shortcut icon" href="./assest/images/logo.png" type="image/x-icon">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>

    <div class="container-fluid">

        <div class="row reset-section">

            <div class="col-md-6 left-side">

                <div class="icon-box">
                    <i class="bi bi-shield-lock-fill"></i>
                </div>

                <h1>Password Recovery</h1>

                <p>
                    Enter your registered email address and we'll send a password reset link.
                </p>

            </div>

            <div class="col-md-6 right-side">

                <div class="reset-card">

                    <div id="resetForm">

                        <h2>Forgot Password?</h2>

                        <p class="mb-4">
                            Enter your email to receive a reset link.
                        </p>

                        <form id="forgotForm">

                            <div class="mb-4">

                                <label class="form-label">
                                    Email Address
                                </label>

                                <input type="email" class="form-control" id="email" placeholder="admin@example.com"required>
                            </div>

                            <button type="submit" class="btn-reset" id="forgot_password">Send Reset Link</button>

                        </form>

                        <div class="back-link">
                            <a href="index.html"><i class="bi bi-arrow-left"></i>Back to Login</a>
                        </div>

                    </div>

                    <div class="success-box" id="successBox">

                        <i class="bi bi-envelope-check-fill"></i>

                        <h4>Check Your Email</h4>

                        <p>
                            We've sent a password reset link to your email.
                        </p>

                        <a href="index.html" class="btn btn-primary">
                            Back To Login
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="supabase.js"></script>
    <script src="reset.js"></script>
</body>
</html>
