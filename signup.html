<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="./style/signup.css">
    <link rel="shortcut icon" href="./assest/images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <div class="container-fluid">
        <div class="row signup-section">

            <!-- Left Side -->
            <div class="col-md-6 left-side">
                <div class="icon-box">
                    <img src="./assest/images/logo.png" alt="logo" width="100" height="100">
                </div>
                <h1>Patient Booking System</h1>
                <p>
                    Create your admin account and start managing
                    appointments, doctors and patients efficiently.
                </p>
            </div>

            <!-- Right Side -->
            <div class="col-md-6 right-side">
                <div class="signup-card">
                    <h2>Create Account</h2>
                    <p class="mb-4">
                        Register your admin account
                    </p>

                    <form>
                        <div class="mb-3">
                            <label class="form-label" for="name">Full Name</label>
                            <input type="text" class="form-control" id="name" placeholder="Enter full name">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="email">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="admin@example.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="number">Phone Number</label>
                            <input type="tel"class="form-control" id="number" placeholder="+92 300 1234567">
                        </div>

                        <div class="mb-3">
                            <label class="form-label" for="password">Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" class="form-control" placeholder="Enter password">
                                <i class="bi bi-eye-slash" id="togglePassword"></i>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label" for="confirm-password">Confirm Password</label>
                            <input type="password" class="form-control" id="confirm-password" placeholder="Confirm password">
                        </div>

                        <div class="mb-4 passwordError" id="passwordError"></div>

                        <button type="submit" id="create_Account" class="btn btn-signup w-100">Create Account</button>
                    </form>

                    <div class="login-link"> 
                        Already have an account?
                        <a href="login.html">Login</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    
    <script src="supabase.js"></script>
    <script src="signup.js"></script>
</body>
</html>
