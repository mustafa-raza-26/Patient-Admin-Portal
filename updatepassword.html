<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Password</title>
    <link rel="stylesheet" href="./style/updatepassword.css">
    <link rel="shortcut icon" href="./assest/images/logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

<div class="container-fluid">

    <div class="row update-section">

        <!-- Left Side -->

        <div class="col-md-6 left-side">

            <div class="icon-box">
                <i class="bi bi-shield-lock-fill"></i>
            </div>

            <h1>Update Password</h1>

            <p>
                Create a new secure password for your Patient Booking System account.
            </p>

        </div>

        <!-- Right Side -->

        <div class="col-md-6 right-side">

            <div class="update-card">

                <h2>Create New Password</h2>

                <p class="subtitle">
                    Enter and confirm your new password.
                </p>

                <div class="mb-3">

                    <label class="form-label">
                        New Password
                    </label>

                    <div class="password-wrapper">

                        <input
                        type="password"
                        id="password"
                        class="form-control"
                        placeholder="Enter new password">

                        <i
                        class="bi bi-eye-slash toggle-password"
                        data-target="password">
                        </i>

                    </div>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Confirm Password
                    </label>

                    <div class="password-wrapper">

                        <input
                        type="password"
                        id="confirmPassword"
                        class="form-control"
                        placeholder="Confirm password">

                        <i
                        class="bi bi-eye-slash toggle-password"
                        data-target="confirmPassword">
                        </i>

                    </div>

                </div>

                <button
                id="update_btn"
                class="btn-update">

                    Update Password

                </button>

            </div>

        </div>

    </div>

</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="supabase.js"></script>
    <script type="module" src="update-password.js"></script>
</body>
</html>
