<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="./style/login.css">
    <link rel="shortcut icon" href="./assest/images/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <div class="container-fluid">
        <div class="row login-section">

            <div id="successMessage" class="success-message">
                Login Successfully! 🎉🎉🎉
            </div>

            <!-- Left Side -->

            <div class="col-md-6 left-side">

                <div class="icon-box">
                    <img src="./assest/images/logo.png" alt="logo" width="100" height="100">
                </div>
                <h1>Patient Booking System</h1>
                <p>
                    Manage appointments, doctors, patients and reports
                    from one secure admin dashboard.
                </p>

            </div>

            <!-- Right Side -->

            <div class="col-md-6 right-side">

                <div class="login-card">
                    <h2>Welcome Back</h2>
                    <p class="mb-4">Login to your admin account</p>
                    <form>

                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" placeholder="admin@example.com" required>
                        </div>

                        <div class="mb-2">
                            <label class="form-label">Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                                <i class="bi bi-eye-slash" id="togglePassword"></i>
                            </div>
                        </div>

                        <div class="d-block justify-content-between mb-4 d-lg-flex p-1">

                            <div class="form-check pb-2">
                                <input class="form-check-input"type="checkbox">
                                <label class="form-check-label">Remember me</label>
                            </div>

                            <a href="./reset.html" id="forgot_password">Forgot Password?</a>

                        </div>
                        <div class="mb-3 loginError" id="loginError"></div>

                        <button type="submit" class="btn btn-login w-100" id="login">Login</button>
                    </form>
                    <div class="signup-link">Don't have an account?<a href="./signup.html">Sign Up</a>
                    </div>

                </div>

            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    
    <script src="supabase.js"></script>
    <script src="login.js"></script>
</body>
</html>
